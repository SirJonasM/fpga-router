name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Install and configure Nix
    - uses: cachix/install-nix-action@v2
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    # 2. Run your build/test commands inside the Nix environment
    # This assumes you have a shell.nix or flake.nix in your repository
    - name: Build and Test
      run: nix-shell --run "cargo build --verbose && cargo test --verbose"
    - name: Lint with Clippy (Nursery & Pedantic)
      run: |
        nix-shell --run "cargo clippy \
          -p router \
          -p router-cli \
          -- -W clippy::nursery -W clippy::pedantic"
