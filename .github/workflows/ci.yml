name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: Build and Test
      run: nix-shell --run "cargo build --verbose && cargo test --verbose"

    - name: Lint with Clippy (Nursery & Pedantic)
      run: |
        nix-shell --run "cargo clippy \
          -p router \
          -p router-cli \
          -- -W clippy::nursery -W clippy::pedantic"
